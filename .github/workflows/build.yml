name: Build libvoicefx.so

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build
        run: |
          ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk NDK_APPLICATION_MK=jni/Application.mk -j4

      - name: Verify exports
        run: |
          echo "=== Exported symbols ==="
          nm -D libs/armeabi-v7a/libvoicefx.so | grep -E "OnModLoad|OnModPreLoad|GetModInfo|vc_"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libvoicefx-armeabi-v7a
          path: libs/armeabi-v7a/libvoicefx.so

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: libs/armeabi-v7a/libvoicefx.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
